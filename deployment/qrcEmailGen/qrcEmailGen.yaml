---
apiVersion: v1
kind: Namespace
metadata:
  name: qrc-gen-email
  labels:
    name: qrc-gen
---
apiVersion: v1
kind: Service
metadata:
  namespace: qrc-gen-email
  name: qrc-gen-front-service
  labels:
    app: qrc-gen-front-service
spec:
  type: ClusterIP
  ports:
    - name: http
      targetPort: 3000
      port: 3000
      protocol: TCP
  selector:
    app: qrc-gen-front
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
  labels:
    app: qrc-gen-front
  name: qrc-gen-front-ingress
  namespace: qrc-gen-email
spec:
  ingressClassName: traefik
  rules:
  - host: qrc-gen.46.224.32.20.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: qrc-gen-front-service
            port:
              number: 3000
  tls:
  - hosts:
    - qrc-gen.46.224.32.20.nip.io # Change by your domain
    secretName: qrc-gen-front
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: qrc-gen-email
  name: qrc-gen-front
  labels:
    app: qrc-gen-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qrc-gen-front
  template:
    metadata:
      name: front
      labels:
        app: qrc-gen-front
    spec:
      containers:
        - name: qrc-gen-front
          image: ghcr.io/ashcycling/frontend:v0.0.3
          imagePullPolicy: Always
          env:
          - name: BACKEND_HOST
            value: "qrc-gen-back-service.qrc-gen-email.svc.cluster.local"
          - name: BACKEND_PORT
            value: "8080"
          resources:
            requests:
              memory: "15Mi"
              cpu: "25m"
            limits:
              memory: "50Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  namespace: qrc-gen-email
  name: qrc-gen-back-service
  labels:
    app: qrc-gen-back-service
spec:
  type: ClusterIP
  ports:
    - name: http
      targetPort: 8080
      port: 8080
      protocol: TCP
  selector:
    app: qrc-gen-back
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: qrc-gen-email
  name: qrc-gen-back
  labels:
    app: qrc-gen-back
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qrc-gen-back
  template:
    metadata:
      name: back
      labels:
        app: qrc-gen-back
    spec:
      containers:
        - name: back
          image: ghcr.io/ashcycling/backend:v0.0.3
          imagePullPolicy: Always
          resources:
            requests:
              memory: "15Mi"
              cpu: "25m"
            limits:
              memory: "50Mi"
              cpu: "500m"