name: Docker Bake main on tag
run-name: ${{ github.actor }} using werf for build in ${{ github.ref_name }} 🚀
on:
    push:
        # branches:
        #     - 'main'
        tags:
            - 'v*.*.*'
jobs:
  build:
    runs-on: self-hosted
    steps:
        - name: Login to GitHub Container Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.TOKEN_PKG }}
        -
          name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3
        -
          name: Build and push
          uses: docker/bake-action@v6
          with:
            # files: /home/runner/_work/qrc-gen/qrc-gen/docker-bake.hcl
            push: true
            # targets: all
            set: |
              backend.tags=ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}
              frontend.tags=ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }}