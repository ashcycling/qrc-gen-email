<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="dark light">
    <meta id="themeColorLight" name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta id="themeColorDark" name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
    <title>QRC Email</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="preload" as="font" type="font/woff2" href="/static/fonts/Inter.woff2" crossorigin>
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('theme');
                var theme = stored === 'light' || stored === 'dark'
                    ? stored
                    : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="/">
            <span class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                    <path d="M14 14h3v3h-3zM20 14v3M14 20h3M17 17h4v4h-4z" opacity=".6"></path>
                </svg>
            </span>
            <span class="brand-name">QRC Email</span>
        </a>
        <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle color theme">
            <svg class="icon icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
            </svg>
            <svg class="icon icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </header>

    <main class="main">
        <section class="card" aria-labelledby="cardTitle">
            <div class="card-head">
                <h1 id="cardTitle" class="card-title">Generate a QR code</h1>
                <p class="card-sub">Create a scannable mailto QR code for any email address.</p>
            </div>

            <form id="qrcForm" class="form" novalidate>
                <div class="field">
                    <label class="label" for="mailto">Email address</label>
                    <input class="input" type="email" id="mailto" name="mailto" placeholder="example@example.com" autocomplete="email" required>
                </div>

                <div class="field">
                    <label class="label" for="subject">Subject <span class="label-aux">optional</span></label>
                    <input class="input" type="text" id="subject" name="subject" placeholder="Subject line">
                </div>

                <div class="field">
                    <label class="label" for="qrcSize">Size <span class="label-aux">100–1000 px</span></label>
                    <input class="input" type="number" id="qrcSize" name="qrcSize" min="100" max="1000" placeholder="256" inputmode="numeric">
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span class="btn-label">Generate</span>
                </button>
            </form>

            <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

            <div id="result" class="result" hidden>
                <div class="result-frame">
                    <img id="qrCodeImage" class="qr" alt="Generated QR code">
                </div>
                <div class="result-actions">
                    <a id="downloadLink" class="btn btn-ghost" download="qr-code.png">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 3v12M7 10l5 5 5-5M5 21h14"></path>
                        </svg>
                        <span>Download PNG</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
